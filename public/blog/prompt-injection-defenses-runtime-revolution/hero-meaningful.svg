<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="760" viewBox="0 0 1520 760" role="img" aria-labelledby="title desc">
  <title id="title">AI agent runtime with prompt injection defenses</title>
  <desc id="desc">A layered runtime diagram with untrusted context, defensive prompts, tool scope, validation gates, and observability around an AI agent core.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#15251f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1520" height="760" fill="url(#bg)"/>
  <path d="M0 610 C270 540 385 660 650 600 C945 533 1110 448 1520 505 L1520 760 L0 760 Z" fill="#0f2f2d" opacity="0.55"/>
  <path d="M0 155 C205 98 450 118 635 160 C872 214 1030 190 1520 94" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.18"/>
  <g opacity="0.26" stroke="#8fb5c8" stroke-width="1">
    <path d="M120 116 H1395"/>
    <path d="M120 232 H1395"/>
    <path d="M120 348 H1395"/>
    <path d="M120 464 H1395"/>
    <path d="M120 580 H1395"/>
    <path d="M260 70 V676"/>
    <path d="M500 70 V676"/>
    <path d="M740 70 V676"/>
    <path d="M980 70 V676"/>
    <path d="M1220 70 V676"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="152" y="142" width="302" height="122" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="186" y="184" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Untrusted context</text>
    <text x="186" y="222" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Docs, issues, web pages</text>
    <rect x="152" y="498" width="302" height="122" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="186" y="540" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Defensive markers</text>
    <text x="186" y="578" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Tripwires and warnings</text>
    <rect x="1066" y="142" width="302" height="122" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="1100" y="184" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Scoped tools</text>
    <text x="1100" y="222" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Least privilege calls</text>
    <rect x="1066" y="498" width="302" height="122" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="1100" y="540" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Validation gates</text>
    <text x="1100" y="578" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Tests, policy, review</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="566" y="226" width="388" height="308" rx="32" fill="#0f172a" stroke="url(#teal)" stroke-width="3"/>
    <circle cx="760" cy="348" r="92" fill="#111827" stroke="#5eead4" stroke-width="3"/>
    <path d="M706 348 H814 M760 294 V402" stroke="#a3e635" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <text x="760" y="468" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Agent Runtime</text>
    <text x="760" y="503" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Context is evidence. Runtime controls authority.</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-width="5">
