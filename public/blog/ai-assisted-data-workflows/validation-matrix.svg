<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="834" viewBox="0 0 1520 834" role="img" aria-labelledby="title desc">
  <title id="title">AI data validation matrix</title>
  <desc id="desc">A validation matrix checking extracted data against type, range, source evidence, and business rules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#081114"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1520" height="834" fill="url(#bg)"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="136" y="112" fill="#a2ff33" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">VALIDATION MATRIX</text>
    <text x="136" y="164" fill="#ffffff" font-size="46" font-weight="800">Trust comes from checks, not confidence</text>
    <text x="136" y="208" fill="#a8b3c4" font-size="22">Each extracted row should carry enough evidence to pass or move into review.</text>
    <g transform="translate(136 278)">
      <rect width="1248" height="410" rx="26" fill="#0b1220" stroke="#293548"/>
      <g fill="#94a3b8" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
        <text x="44" y="62">field</text>
        <text x="304" y="62">type</text>
        <text x="514" y="62">range</text>
        <text x="734" y="62">source</text>
        <text x="984" y="62">status</text>
      </g>
      <g stroke="#ffffff" stroke-opacity="0.12">
        <path d="M34 88h1180M34 166h1180M34 244h1180M34 322h1180"/>
      </g>
      <g font-size="24">
        <text x="44" y="136" fill="#ffffff" font-weight="800">product_name</text>
        <text x="304" y="136" fill="#cbd5e1">string</text>
        <text x="514" y="136" fill="#cbd5e1">not empty</text>
        <text x="734" y="136" fill="#cbd5e1">visible label</text>
        <text x="984" y="136" fill="#a2ff33" font-weight="800">pass</text>
        <text x="44" y="214" fill="#ffffff" font-weight="800">price_amount</text>
        <text x="304" y="214" fill="#cbd5e1">number</text>
        <text x="514" y="214" fill="#cbd5e1">0 - 50000</text>
        <text x="734" y="214" fill="#cbd5e1">text span</text>
        <text x="984" y="214" fill="#a2ff33" font-weight="800">pass</text>
        <text x="44" y="292" fill="#ffffff" font-weight="800">availability</text>
        <text x="304" y="292" fill="#cbd5e1">enum</text>
        <text x="514" y="292" fill="#cbd5e1">allowed</text>
        <text x="734" y="292" fill="#cbd5e1">ambiguous</text>
        <text x="984" y="292" fill="#fbbf24" font-weight="800">review</text>
        <text x="44" y="370" fill="#ffffff" font-weight="800">lead_time_days</text>
        <text x="304" y="370" fill="#cbd5e1">integer</text>
        <text x="514" y="370" fill="#cbd5e1">0 - 90</text>
        <text x="734" y="370" fill="#cbd5e1">missing</text>
        <text x="984" y="370" fill="#fb7185" font-weight="800">fail</text>
      </g>
    </g>
  </g>
</svg>
