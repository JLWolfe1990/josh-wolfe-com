<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="834" viewBox="0 0 1520 834" role="img" aria-labelledby="title desc">
  <title id="title">Coding Prompt Stack</title>
  <desc id="desc">A layered prompt structure showing role, context, task, constraints, output, and review criteria feeding an AI coding prompt.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1418"/>
      <stop offset="1" stop-color="#162225"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2d31"/>
      <stop offset="1" stop-color="#10191d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1520" height="834" fill="url(#bg)"/>
  <path d="M0 118h1520M0 236h1520M0 354h1520M0 472h1520M0 590h1520M0 708h1520M152 0v834M304 0v834M456 0v834M608 0v834M760 0v834M912 0v834M1064 0v834M1216 0v834M1368 0v834" stroke="#203236" stroke-width="1" opacity="0.55"/>
  <text x="86" y="115" fill="#f3f7f5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800">Coding Prompt Stack</text>
  <text x="90" y="161" fill="#91a3a0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25">Context, task, constraints, and review criteria turn vague AI help into usable engineering output.</text>

  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g transform="translate(136 232)">
      <rect x="0" y="0" width="610" height="62" rx="14" fill="url(#panel)" stroke="#2dd4bf" stroke-width="2"/>
      <text x="26" y="40" fill="#2dd4bf" font-size="22" font-weight="800">ROLE</text>
      <text x="186" y="40" fill="#f3f7f5" font-size="22">Set the engineering lens</text>
    </g>
    <g transform="translate(164 312)">
      <rect x="0" y="0" width="610" height="62" rx="14" fill="#21343a" stroke="#a2ff33" stroke-width="2"/>
      <text x="26" y="40" fill="#a2ff33" font-size="22" font-weight="800">CONTEXT</text>
      <text x="186" y="40" fill="#f3f7f5" font-size="22">Stack, data shape, local patterns</text>
    </g>
    <g transform="translate(192 392)">
      <rect x="0" y="0" width="610" height="62" rx="14" fill="url(#panel)" stroke="#2dd4bf" stroke-width="2"/>
      <text x="26" y="40" fill="#2dd4bf" font-size="22" font-weight="800">TASK</text>
      <text x="186" y="40" fill="#f3f7f5" font-size="22">Specific behavior to implement</text>
    </g>
    <g transform="translate(220 472)">
      <rect x="0" y="0" width="610" height="62" rx="14" fill="#21343a" stroke="#a2ff33" stroke-width="2"/>
      <text x="26" y="40" fill="#a2ff33" font-size="22" font-weight="800">CONSTRAINTS</text>
      <text x="216" y="40" fill="#f3f7f5" font-size="22">Versions, dependencies, limits</text>
    </g>
    <g transform="translate(248 552)">
      <rect x="0" y="0" width="610" height="62" rx="14" fill="url(#panel)" stroke="#2dd4bf" stroke-width="2"/>
      <text x="26" y="40" fill="#2dd4bf" font-size="22" font-weight="800">OUTPUT</text>
      <text x="186" y="40" fill="#f3f7f5" font-size="22">Code, tests, plan, or review</text>
    </g>
    <g transform="translate(276 632)">
      <rect x="0" y="0" width="610" height="62" rx="14" fill="#21343a" stroke="#f5a623" stroke-width="2"/>
      <text x="26" y="40" fill="#f5a623" font-size="22" font-weight="800">REVIEW</text>
      <text x="186" y="40" fill="#f3f7f5" font-size="22">Edge cases and acceptance bar</text>
    </g>
  </g>

  <path d="M886 462h78" stroke="#a2ff33" stroke-width="5" stroke-linecap="round"/>
  <path d="M964 462l-20-12v24z" fill="#a2ff33"/>
  <g filter="url(#shadow)">
    <rect x="994" y="220" width="430" height="424" rx="24" fill="#0b1115" stroke="#405551" stroke-width="2"/>
    <text x="1030" y="266" fill="#2dd4bf" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">prompt.md</text>
    <rect x="1030" y="314" width="330" height="22" rx="7" fill="#263b40"/>
    <rect x="1030" y="366" width="282" height="22" rx="7" fill="#263b40"/>
    <rect x="1030" y="418" width="352" height="22" rx="7" fill="#263b40"/>
    <rect x="1030" y="470" width="250" height="22" rx="7" fill="#263b40"/>
    <rect x="1030" y="522" width="306" height="22" rx="7" fill="#263b40"/>
    <rect x="1030" y="574" width="214" height="22" rx="7" fill="#263b40"/>
    <circle cx="1372" cy="260" r="11" fill="#a2ff33"/>
  </g>
</svg>
