<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="760" viewBox="0 0 1520 760" role="img" aria-labelledby="title desc">
  <title id="title">AI agent infrastructure layer for vibe coding</title>
  <desc id="desc">A layered technical diagram connecting prompt-driven coding to model efficiency, protocols, payment rails, validation, and deployment controls.</desc>
  <rect width="1520" height="760" fill="#111611"/>
  <rect x="0" y="0" width="1520" height="760" fill="url(#grid)" opacity="0.34"/>
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#314039" stroke-width="1"/>
    </pattern>
    <linearGradient id="band" x1="190" x2="1330" y1="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#a2ff33" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect x="140" y="94" width="1240" height="572" rx="28" fill="#182019" stroke="#314039" stroke-width="2"/>
  <rect x="190" y="132" width="1140" height="82" rx="18" fill="#e8fff2" opacity="0.94"/>
  <text x="230" y="180" fill="#102016" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">prompt driven coding</text>
  <text x="1010" y="181" fill="#23524a" font-family="Inter, Arial, sans-serif" font-size="19">visible surface</text>
  <path d="M760 224V274" stroke="#a2ff33" stroke-width="5" stroke-linecap="round"/>
  <g>
    <rect x="190" y="274" width="1140" height="72" rx="18" fill="url(#band)" stroke="#3f5f55"/>
    <text x="230" y="319" fill="#f8fff9" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">model efficiency</text>
    <text x="533" y="319" fill="#c8d8cf" font-family="Inter, Arial, sans-serif" font-size="18">routing, chips, latency, cost</text>
  </g>
  <g>
    <rect x="190" y="374" width="1140" height="72" rx="18" fill="#17292a" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <text x="230" y="419" fill="#f8fff9" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">agent protocols</text>
    <text x="533" y="419" fill="#c8d8cf" font-family="Inter, Arial, sans-serif" font-size="18">context, identity, tool contracts, handoffs</text>
  </g>
  <g>
    <rect x="190" y="474" width="1140" height="72" rx="18" fill="#1b2230" stroke="#60a5fa" stroke-opacity="0.55"/>
    <text x="230" y="519" fill="#f8fff9" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">economic rails</text>
    <text x="533" y="519" fill="#c8d8cf" font-family="Inter, Arial, sans-serif" font-size="18">budgets, paid APIs, provisioned resources</text>
  </g>
  <g>
    <rect x="190" y="574" width="1140" height="56" rx="18" fill="#263226" stroke="#a2ff33" stroke-opacity="0.55"/>
    <text x="230" y="610" fill="#f8fff9" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">validation, review, deploy, observe</text>
  </g>
  <circle cx="1185" cy="173" r="14" fill="#a2ff33"/>
  <circle cx="1228" cy="173" r="14" fill="#2dd4bf"/>
  <circle cx="1271" cy="173" r="14" fill="#60a5fa"/>
  <path d="M115 629C345 604 431 697 670 649C908 601 1016 676 1404 606" fill="none" stroke="#a2ff33" stroke-width="3" opacity="0.38" filter="url(#soft)"/>
</svg>
