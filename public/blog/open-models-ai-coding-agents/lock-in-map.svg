<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="834" viewBox="0 0 1520 834" role="img" aria-labelledby="title desc">
  <title id="title">AI coding vendor lock-in map</title>
  <desc id="desc">Diagram mapping lock-in surfaces across model API, prompt behavior, agent tools, cost controls, and production review gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101412"/>
      <stop offset="1" stop-color="#221d14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a2ff33"/>
      <stop offset="1" stop-color="#24d6b3"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1520" height="834" fill="url(#bg)"/>
  <g opacity="0.12" stroke="#ffffff">
    <path d="M120 168 H1400"/>
    <path d="M120 308 H1400"/>
    <path d="M120 448 H1400"/>
    <path d="M120 588 H1400"/>
    <path d="M280 110 V704"/>
    <path d="M520 110 V704"/>
    <path d="M760 110 V704"/>
    <path d="M1000 110 V704"/>
    <path d="M1240 110 V704"/>
  </g>

  <text x="120" y="92" fill="#f5fff7" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Where AI coding lock-in hides</text>
  <text x="120" y="130" fill="#aab5ae" font-family="Inter, Arial, sans-serif" font-size="19">The model endpoint is only one surface. The workflow around it is where switching gets expensive.</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="120" y="188" width="250" height="170" rx="22" fill="#151b18" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="150" y="236" fill="#ffbd8a" font-size="19" font-weight="800">Model API</text>
    <text x="150" y="276" fill="#dbe4df" font-size="28" font-weight="800">Endpoint</text>
    <text x="150" y="314" fill="#98a49e" font-size="16">Pricing, limits, policy, latency</text>

    <rect x="418" y="188" width="250" height="170" rx="22" fill="#151b18" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="448" y="236" fill="#ffd166" font-size="19" font-weight="800">Prompt debt</text>
    <text x="448" y="276" fill="#dbe4df" font-size="28" font-weight="800">Behavior</text>
    <text x="448" y="314" fill="#98a49e" font-size="16">Quirks, formats, hidden habits</text>

    <rect x="716" y="188" width="250" height="170" rx="22" fill="#151b18" stroke="#a2ff33" stroke-opacity="0.35"/>
    <text x="746" y="236" fill="#a2ff33" font-size="19" font-weight="800">Agent tools</text>
    <text x="746" y="276" fill="#f4fff7" font-size="28" font-weight="800">Contract</text>
    <text x="746" y="314" fill="#a8b6af" font-size="16">Read, write, run, recover, stop</text>

    <rect x="1014" y="188" width="250" height="170" rx="22" fill="#151b18" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="1044" y="236" fill="#62e6c7" font-size="19" font-weight="800">Cost model</text>
    <text x="1044" y="276" fill="#dbe4df" font-size="28" font-weight="800">Budget</text>
    <text x="1044" y="314" fill="#98a49e" font-size="16">Token spend, retries, throughput</text>

    <rect x="418" y="462" width="250" height="170" rx="22" fill="#151b18" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="448" y="510" fill="#7ad7ff" font-size="19" font-weight="800">Evaluation</text>
    <text x="448" y="550" fill="#dbe4df" font-size="28" font-weight="800">Evidence</text>
    <text x="448" y="588" fill="#98a49e" font-size="16">Pass rate, failures, replay logs</text>

    <rect x="716" y="462" width="250" height="170" rx="22" fill="#151b18" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="746" y="510" fill="#ff8f5a" font-size="19" font-weight="800">Review gate</text>
    <text x="746" y="550" fill="#dbe4df" font-size="28" font-weight="800">Decision</text>
    <text x="746" y="588" fill="#98a49e" font-size="16">Human judgment, tests, deploy</text>
  </g>

  <path d="M370 273 H418 M668 273 H716 M966 273 H1014 M841 358 V462 M668 548 H716" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="841" cy="410" r="12" fill="#a2ff33"/>
  <rect x="1120" y="520" width="280" height="112" rx="18" fill="#0e1311" stroke="#a2ff33" stroke-opacity="0.32"/>
  <text x="1150" y="562" fill="#f5fff7" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Control point</text>
  <text x="1150" y="596" fill="#a8b6af" font-family="Inter, Arial, sans-serif" font-size="16">Make each surface explicit,</text>
  <text x="1150" y="622" fill="#a8b6af" font-family="Inter, Arial, sans-serif" font-size="16">versioned, and testable.</text>
</svg>
