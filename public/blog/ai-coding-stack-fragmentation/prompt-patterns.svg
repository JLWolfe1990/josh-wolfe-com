<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="834" viewBox="0 0 1520 834" role="img" aria-labelledby="title desc">
  <title id="title">Prompt patterns for vibe coding and agents</title>
  <desc id="desc">A comparison of short conversational prompts for vibe coding and explicit structured prompts for agentic coding workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#17251c"/>
    </linearGradient>
  </defs>
  <rect width="1520" height="834" fill="url(#bg)"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="132" y="118" fill="#a2ff33" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">PROMPT STYLE</text>
    <text x="132" y="168" fill="#ffffff" font-size="46" font-weight="800">Short for flow. Explicit for autonomy.</text>
  </g>
  <g transform="translate(132 238)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect width="592" height="430" rx="26" fill="#111827" stroke="#334155"/>
    <text x="42" y="62" fill="#ffffff" font-size="34" font-weight="800">Vibe coding prompt</text>
    <text x="42" y="104" fill="#a8b3c4" font-size="21">Human is steering in a tight loop.</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">
      <rect x="42" y="148" width="508" height="64" rx="12" fill="#0b1220"/>
      <text x="64" y="188" fill="#dbeafe">"Fix the type error here."</text>
      <rect x="42" y="232" width="508" height="64" rx="12" fill="#0b1220"/>
      <text x="64" y="272" fill="#dbeafe">"Add keyboard support."</text>
      <rect x="42" y="316" width="508" height="64" rx="12" fill="#0b1220"/>
      <text x="64" y="356" fill="#dbeafe">"Make this match the component."</text>
    </g>
  </g>
  <g transform="translate(796 238)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect width="592" height="430" rx="26" fill="#10251c" stroke="#3c6b46"/>
    <text x="42" y="62" fill="#ffffff" font-size="34" font-weight="800">Agent prompt</text>
    <text x="42" y="104" fill="#a8b3c4" font-size="21">System acts across files and commands.</text>
    <g font-size="22">
      <text x="42" y="164" fill="#a2ff33" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Goal</text>
      <text x="150" y="164" fill="#dbeafe">Migrate this package to Vitest.</text>
      <text x="42" y="220" fill="#a2ff33" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Scope</text>
      <text x="150" y="220" fill="#dbeafe">Only tests and test config.</text>
      <text x="42" y="276" fill="#a2ff33" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Checks</text>
      <text x="150" y="276" fill="#dbeafe">Run lint, typecheck, and tests.</text>
      <text x="42" y="332" fill="#a2ff33" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Stop</text>
      <text x="150" y="332" fill="#dbeafe">Ask if public API must change.</text>
      <text x="42" y="388" fill="#a2ff33" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Report</text>
      <text x="150" y="388" fill="#dbeafe">Summarize diff, risks, and checks.</text>
    </g>
  </g>
  <path d="M704 454h92" stroke="#a2ff33" stroke-width="5" stroke-linecap="round"/>
  <path d="M780 434l20 20-20 20" fill="none" stroke="#a2ff33" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
