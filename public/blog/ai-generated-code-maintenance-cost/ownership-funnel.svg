<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="834" viewBox="0 0 1520 834" role="img" aria-labelledby="title desc">
  <title id="title">AI-generated code ownership funnel</title>
  <desc id="desc">Generated options narrowing through architecture fit, tests, review, documentation, and ownership before shipping.</desc>
  <rect width="1520" height="834" fill="#0b1320"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="112" y="108" fill="#ffffff" font-size="42" font-weight="900">Cheap drafts are useful. Permanent complexity is not.</text>
    <text x="112" y="150" fill="#aebdd0" font-size="20">Generate broadly, then narrow aggressively before code becomes product surface area.</text>
    <g transform="translate(140 230)">
      <path d="M0 0 H1240 L1040 420 H200 Z" fill="#132235" stroke="#ffffff" stroke-opacity=".14"/>
      <path d="M76 62 H1164 L1040 146 H200 Z" fill="#173b4e"/>
      <path d="M200 172 H1040 L914 256 H326 Z" fill="#183f35"/>
      <path d="M326 282 H914 L790 366 H450 Z" fill="#3b3520"/>
      <rect x="450" y="394" width="340" height="92" rx="16" fill="#10291e" stroke="#a2ff33" stroke-opacity=".6"/>
      <text x="132" y="115" fill="#38d7ff" font-size="27" font-weight="900">AI-generated options</text>
      <text x="380" y="225" fill="#a2ff33" font-size="27" font-weight="900">architecture fit + duplicate removal</text>
      <text x="468" y="335" fill="#f7d56f" font-size="27" font-weight="900">tests + review + docs</text>
      <text x="528" y="448" fill="#ffffff" font-size="28" font-weight="900">owned change</text>
    </g>
    <g fill="#9fb0c5" font-size="18">
      <text x="125" y="724">Keep the exploration. Ship the smallest durable implementation.</text>
      <text x="125" y="756">The expensive part is not typing code. It is carrying every retained decision forward.</text>
    </g>
  </g>
</svg>
