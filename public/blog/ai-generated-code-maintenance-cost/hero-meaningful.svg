    <circle cx="220" cy="175" r="7" fill="#ff6868"/>
    <circle cx="246" cy="175" r="7" fill="#f7d56f"/>
    <circle cx="272" cy="175" r="7" fill="#81ee8e"/>
    <text x="316" y="181" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">AI code ownership review</text>
    <text x="1116" y="181" fill="#a2ff33" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">draft speed != lifecycle cost</text>
  </g>
