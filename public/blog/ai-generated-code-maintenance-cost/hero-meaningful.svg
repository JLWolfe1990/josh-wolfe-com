<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="760" viewBox="0 0 1520 760" role="img" aria-labelledby="title desc">
  <title id="title">AI-generated code ownership dashboard</title>
  <desc id="desc">A full-width engineering dashboard showing fast AI code generation flowing into review, tests, documentation, monitoring, and maintenance ownership.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset=".48" stop-color="#102335"/>
      <stop offset="1" stop-color="#18251c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#173047"/>
      <stop offset="1" stop-color="#0d1a29"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#a2ff33"/>
      <stop offset=".5" stop-color="#38d7ff"/>
      <stop offset="1" stop-color="#f7d56f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1520" height="760" fill="url(#bg)"/>
  <path d="M0 650 C210 570 320 690 520 610 C760 515 900 650 1120 555 C1300 478 1415 516 1520 470 L1520 760 L0 760 Z" fill="#203322" opacity=".7"/>
