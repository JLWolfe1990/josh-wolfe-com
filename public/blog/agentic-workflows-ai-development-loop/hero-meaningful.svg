        <text x="78" y="69" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Goal</text>
        <text x="78" y="101" text-anchor="middle" fill="#cbd5e1" font-family="JetBrains Mono, monospace" font-size="15">define done</text>
      </g>
      <g transform="translate(298)">
        <rect width="156" height="156" rx="22" fill="#102129" stroke="#38bdf8" stroke-opacity="0.55"/>
