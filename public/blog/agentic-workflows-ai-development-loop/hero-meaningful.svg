<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 760" role="img" aria-labelledby="title desc">
  <title id="title">Agentic development workflow command center</title>
  <desc id="desc">A dark engineering workflow board connecting prompt, agent, tools, pull request, review, and deployment stages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071114"/>
      <stop offset="0.48" stop-color="#10251f"/>
      <stop offset="1" stop-color="#16140d"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#a2ff33"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1520" height="760" fill="url(#bg)"/>
  <g opacity="0.2">
