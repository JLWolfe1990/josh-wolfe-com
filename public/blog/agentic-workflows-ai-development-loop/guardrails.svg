<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 834" role="img" aria-labelledby="title desc">
  <title id="title">Agent workflow guardrails</title>
  <desc id="desc">A layered checklist of guardrails for agentic software development workflows.</desc>
  <rect width="1520" height="834" fill="#091113"/>
  <g transform="translate(118 94)">
    <text x="0" y="44" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Guardrails before autonomy</text>
    <text x="0" y="84" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Agents are useful when their permissions, feedback, and review path are explicit.</text>
    <g transform="translate(0 142)" font-family="Inter, Arial, sans-serif">
      <g>
        <rect width="1284" height="94" rx="18" fill="#13201d" stroke="#a2ff33" stroke-opacity="0.45"/>
        <circle cx="48" cy="47" r="18" fill="#a2ff33"/>
        <path d="M39 47l7 8 13-17" fill="none" stroke="#081114" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="92" y="39" fill="#ffffff" font-size="24" font-weight="800">Narrow goal</text>
        <text x="92" y="67" fill="#cbd5e1" font-size="17">Give the agent one workflow with a clear definition of done.</text>
      </g>
      <g transform="translate(0 118)">
        <rect width="1284" height="94" rx="18" fill="#102129" stroke="#38bdf8" stroke-opacity="0.45"/>
        <circle cx="48" cy="47" r="18" fill="#38bdf8"/>
        <path d="M39 47l7 8 13-17" fill="none" stroke="#081114" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="92" y="39" fill="#ffffff" font-size="24" font-weight="800">Scoped tools</text>
        <text x="92" y="67" fill="#cbd5e1" font-size="17">Permit reads, branches, tests, and pull requests before merge or production access.</text>
      </g>
      <g transform="translate(0 236)">
        <rect width="1284" height="94" rx="18" fill="#171b28" stroke="#818cf8" stroke-opacity="0.45"/>
        <circle cx="48" cy="47" r="18" fill="#818cf8"/>
        <path d="M39 47l7 8 13-17" fill="none" stroke="#081114" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="92" y="39" fill="#ffffff" font-size="24" font-weight="800">Fast feedback</text>
        <text x="92" y="67" fill="#cbd5e1" font-size="17">Make tests, type checks, lint, and preview checks visible to the agent.</text>
      </g>
      <g transform="translate(0 354)">
        <rect width="1284" height="94" rx="18" fill="#211b12" stroke="#fbbf24" stroke-opacity="0.48"/>
        <circle cx="48" cy="47" r="18" fill="#fbbf24"/>
        <path d="M39 47l7 8 13-17" fill="none" stroke="#081114" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="92" y="39" fill="#ffffff" font-size="24" font-weight="800">Human review</text>
        <text x="92" y="67" fill="#cbd5e1" font-size="17">Keep the decision to merge, deploy, or message customers under human or explicit policy control.</text>
      </g>
    </g>
  </g>
</svg>
